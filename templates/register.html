{% extends 'base.html' %}
{% block content %}
<section class="card narrow">
  <h1>Register</h1>
  <p class="muted">Create an account to view fleets and alerts. Staff accounts can edit.</p>
  <form method="post" action="/register/" class="stack">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <label><span>Username</span>{{ form.username }}</label>
    <label><span>Email</span>{{ form.email }}</label>
    <label><span>Password</span>{{ form.password1 }}</label>
    <label><span>Confirm password</span>{{ form.password2 }}</label>
    <button class="btn" type="submit">Create account</button>
  </form>
</section>
{% endblock %}
