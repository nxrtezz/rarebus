{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="{% static 'favicon.ico' %}">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{% static 'app.css' %}">
  <link rel="stylesheet" href="https://bustimes.org/static/css/liveries.css">
  <style>
    :root {
      --brand: {{ active_operator.theme_color|default:"#00539f" }};
      --accent: {{ active_operator.accent_color|default:"#f0ad4e" }};
    }
  </style>
</head>
<body>
  {% include 'partials/header.html' %}
  <main class="wrap page">
    {% block content %}{% endblock %}
  </main>
  {% include 'partials/footer.html' %}
</body>
</html>
